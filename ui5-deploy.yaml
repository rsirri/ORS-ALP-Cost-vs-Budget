# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zorsactbdgdist
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: s4pp_100
          url: http://e4d.virtual:443
          client: '100'
        app:
          name: ZORS_ACT_BUDGET
          description: ORS Actual vs Budget by District
          package: $tmp
          transport: ''
        exclude:
          - /test/
